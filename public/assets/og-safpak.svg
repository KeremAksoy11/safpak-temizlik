<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SafPak Temizlik Hizmetleri</title>
  <desc id="desc">SafPak logosu, temizlik hizmetleri ve WhatsApp iletişim numarasını gösteren sosyal medya paylaşım görseli</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041722" />
      <stop offset="1" stop-color="#0b3550" />
    </linearGradient>
    <linearGradient id="photoShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#041722" stop-opacity=".72" />
      <stop offset=".5" stop-color="#041722" stop-opacity=".22" />
      <stop offset="1" stop-color="#041722" stop-opacity=".48" />
    </linearGradient>
    <linearGradient id="lightPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#eaf7fc" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42c4f4" />
      <stop offset="1" stop-color="#16a9ee" />
    </linearGradient>
    <clipPath id="photoClip">
      <rect x="610" y="0" width="590" height="630" />
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#041722" flood-opacity=".2" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#backdrop)" />
  <g clip-path="url(#photoClip)">
    <image href="hero-poster.jpg" x="610" y="0" width="590" height="630" preserveAspectRatio="xMidYMid slice" />
    <rect x="610" width="590" height="630" fill="url(#photoShade)" />
  </g>

  <path d="M0 0H748C703 104 742 184 711 282C680 381 737 511 648 630H0Z" fill="url(#lightPanel)" />
  <path d="M727 0C690 111 735 187 704 283C675 376 727 501 637 630" fill="none" stroke="#42c4f4" stroke-opacity=".34" stroke-width="3" />

  <circle cx="1080" cy="93" r="88" fill="#42c4f4" fill-opacity=".13" />
  <path d="M1080 41c4 24 17 37 41 41-24 4-37 17-41 41-4-24-17-37-41-41 24-4 37-17 41-41Z" fill="#ffffff" fill-opacity=".9" />
  <path d="M1000 140c2 13 9 20 22 22-13 2-20 9-22 22-2-13-9-20-22-22 13-2 20-9 22-22Z" fill="#42c4f4" />

  <image href="safpak-logo.svg" x="64" y="52" width="500" height="134" />

  <text x="72" y="270" fill="#08263a" font-family="Manrope, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-2.5">Koltuk, yatak ve</text>
  <text x="72" y="331" fill="#0876b8" font-family="Manrope, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-2.5">halı yıkamada uzman.</text>
  <text x="74" y="382" fill="#536a78" font-family="DM Sans, Arial, sans-serif" font-size="23" font-weight="600">İstanbul’da yerinde profesyonel temizlik.</text>

  <g font-family="DM Sans, Arial, sans-serif" font-size="16" font-weight="700" fill="#08263a">
    <rect x="72" y="417" width="154" height="43" rx="21.5" fill="#d9f5ff" />
    <circle cx="94" cy="438.5" r="6" fill="#16a9ee" />
    <text x="109" y="444">Koltuk Yıkama</text>

    <rect x="238" y="417" width="148" height="43" rx="21.5" fill="#d9f5ff" />
    <circle cx="260" cy="438.5" r="6" fill="#16a9ee" />
    <text x="275" y="444">Yatak Yıkama</text>

    <rect x="398" y="417" width="137" height="43" rx="21.5" fill="#d9f5ff" />
    <circle cx="420" cy="438.5" r="6" fill="#16a9ee" />
    <text x="435" y="444">Halı Yıkama</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="502" width="347" height="67" rx="33.5" fill="#25d366" />
    <circle cx="108" cy="535.5" r="21" fill="#ffffff" fill-opacity=".18" />
    <path d="M109 520a15 15 0 0 0-12.7 23l-2.1 7.6 7.8-2a15 15 0 1 0 7-28.6Zm7.7 21.3c-.3.8-1.7 1.5-2.4 1.6-.7.1-1.6.2-2.6-.2-.6-.2-1.4-.5-2.4-.9-4.2-1.8-7-6.1-7.2-6.4-.2-.3-1.7-2.3-1.7-4.4 0-2.1 1.1-3.2 1.5-3.6.4-.4.8-.5 1.1-.5h.8c.3 0 .6-.1.9.7l1.1 2.7c.1.2.1.5 0 .7l-.5.7-.7.7c-.2.2-.5.5-.2.9.3.5 1.2 2 2.6 3.2 1.8 1.6 3.3 2.1 3.8 2.3.5.2.8.2 1-.1l1.4-1.6c.3-.4.6-.3 1-.2l2.5 1.2c.5.2.8.3.9.5.1.1.1.8-.2 1.6Z" fill="#fff" />
    <text x="141" y="530" fill="#ffffff" font-family="DM Sans, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1">WHATSAPP</text>
    <text x="141" y="551" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="21" font-weight="800">0549 534 46 46</text>
  </g>

  <g transform="translate(796 492)" filter="url(#softShadow)">
    <rect width="330" height="82" rx="22" fill="#041722" fill-opacity=".82" stroke="#ffffff" stroke-opacity=".18" />
    <circle cx="38" cy="41" r="20" fill="url(#accent)" />
    <path d="M38 27c-6 9-11 16-11 22a11 11 0 0 0 22 0c0-6-5-13-11-22Z" fill="#fff" fill-opacity=".95" />
    <text x="72" y="34" fill="#d9f5ff" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1">İSTANBUL</text>
    <text x="72" y="57" fill="#ffffff" font-family="DM Sans, Arial, sans-serif" font-size="16" font-weight="700">Avcılar • Esenyurt • Beylikdüzü</text>
  </g>
</svg>
